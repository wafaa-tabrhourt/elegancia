{% extends "base.html" %}

{% block content %}

<h1 class="page-title">Votre panier</h1>

<div id="cart-items">

{% for item in items %}
<div class="cart-item">
    <div>
        <div class="item-name">{{ item.name }}</div>
        <div class="item-price">{{ item.price }} DH</div>
    </div>

    <a href="/remove/{{ loop.index0 }}" class="btn-remove">Supprimer</a>
</div>
{% endfor %}

</div>

<hr class="divider">

<div class="total-row">
    <span class="total-label">Total</span>
    <span class="total-amount">{{ total }} DH</span>
</div>

<a href="/order" class="btn-primary">Commander</a>

{% endblock %}
