{% extends "base.html" %}

{% block content %}

<div style="max-width: 600px; margin: 0 auto; padding: 2rem;">

    <h1 class="page-title">Votre panier</h1>

    {% if items %}

        <div id="cart-items">
            {% for item in items %}
            <div class="cart-item">
                <div>
                    <div class="item-name">{{ item.name }}</div>
                    <div class="item-price">{{ item.price }} DH</div>
                </div>
                <a href="/remove/{{ loop.index0 }}" class="btn-remove">Supprimer</a>
            </div>
            {% endfor %}
        </div>

        <hr class="divider">

        <div class="total-row">
            <span class="total-label">Total</span>
            <span class="total-amount">{{ total }} DH</span>
        </div>

        <a href="/order" class="btn-primary" style="display:block; text-align:center; text-decoration:none; margin-top: 1rem;">
            Commander
        </a>

    {% else %}
        <p class="empty-msg">Votre panier est vide.</p>
        <a href="/" class="btn-primary" style="display:block; text-align:center; text-decoration:none; margin-top:1rem;">
            Continuer mes achats
        </a>
    {% endif %}

</div>

{% endblock %}
