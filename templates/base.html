<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>{% block title %}Elegancia{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{font-family:'Jost',sans-serif;color:#1a1a18;background:#faf9f7;line-height:1.6}

/* NAV */
nav{display:flex;align-items:center;justify-content:space-between;padding:0 48px;height:68px;background:#fff;border-bottom:0.5px solid rgba(0,0,0,0.08);position:sticky;top:0;z-index:100}
.nav-logo{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:400;letter-spacing:0.12em;text-decoration:none;color:#1a1a18;text-transform:uppercase}
.nav-links{display:flex;align-items:center;gap:32px}
.nav-links a{text-decoration:none;color:#4a4a48;font-size:13px;letter-spacing:0.08em;text-transform:uppercase;transition:.2s;font-weight:400}
.nav-links a:hover{color:#C9A84C}
.nav-links a.active{color:#C9A84C;border-bottom:1px solid #C9A84C;padding-bottom:2px}
.nav-cart{position:relative;text-decoration:none;color:#1a1a18;font-size:13px;letter-spacing:0.06em;text-transform:uppercase;display:flex;align-items:center;gap:8px;transition:.2s}
.nav-cart:hover{color:#C9A84C}
.cart-count{background:#C9A84C;color:#fff;border-radius:50%;width:18px;height:18px;font-size:10px;display:flex;align-items:center;justify-content:center;font-weight:500}

/* HERO */
.hero{min-height:88vh;background:linear-gradient(160deg,#1a1a18 0%,#2d2b27 50%,#1a1a18 100%);display:flex;align-items:center;justify-content:center;text-align:center;padding:4rem 2rem;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23C9A84C' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");}
.hero-content{position:relative;z-index:1}
.hero h1{font-family:'Cormorant Garamond',serif;font-size:clamp(42px,7vw,80px);font-weight:300;color:#fff;letter-spacing:0.08em;margin-bottom:1.2rem;line-height:1.1}
.divider{width:60px;height:1px;background:#C9A84C;margin:1.2rem auto}
.hero p{color:rgba(255,255,255,0.7);font-size:15px;letter-spacing:0.05em;margin-bottom:0.5rem}
.hero .subtitle{color:rgba(255,255,255,0.5);font-size:13.5px;max-width:480px;margin:0 auto 2.5rem;line-height:1.7}
.hero-actions{display:flex;gap:16px;justify-content:center;flex-wrap:wrap}

/* BUTTONS */
.btn-primary{background:#C9A84C;color:#fff;padding:13px 32px;border-radius:0;font-family:'Jost',sans-serif;font-size:12px;letter-spacing:0.12em;text-transform:uppercase;text-decoration:none;border:1px solid #C9A84C;transition:.25s;display:inline-block;cursor:pointer}
.btn-primary:hover{background:#b8962f;border-color:#b8962f;transform:translateY(-1px)}
.btn-outline{background:transparent;color:#fff;padding:13px 32px;border:1px solid rgba(255,255,255,0.4);font-family:'Jost',sans-serif;font-size:12px;letter-spacing:0.12em;text-transform:uppercase;text-decoration:none;transition:.25s;display:inline-block}
.btn-outline:hover{border-color:#C9A84C;color:#C9A84C}

/* FEATURES */
.features{display:grid;grid-template-columns:repeat(3,1fr);background:#fff;border-top:0.5px solid rgba(0,0,0,0.06)}
.feature-item{padding:2.5rem 2rem;text-align:center;border-right:0.5px solid rgba(0,0,0,0.06)}
.feature-item:last-child{border-right:none}
.feature-item h3{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:500;margin-bottom:0.6rem;color:#1a1a18}
.feature-item p{font-size:13px;color:#7a7570;line-height:1.65}

/* COLLECTION */
.collection-container{max-width:1200px;margin:0 auto;padding:3.5rem 2rem 5rem}
.collection-title{font-family:'Cormorant Garamond',serif;font-size:clamp(28px,4vw,42px);font-weight:300;text-align:center;letter-spacing:0.06em;margin-bottom:0.5rem}
.title-divider{width:50px;height:1px;background:#C9A84C;margin:0 auto 3rem}
.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:28px}

/* PRODUCT CARD */
.product-card{background:#fff;border:0.5px solid rgba(0,0,0,0.07);transition:.3s;overflow:hidden}
.product-card:hover{box-shadow:0 12px 40px rgba(0,0,0,0.1);transform:translateY(-3px)}
.product-image-container{position:relative;height:340px;background:#f5f0e8;overflow:hidden;cursor:pointer}
.main-product-img{width:100%;height:100%;object-fit:cover;transition:transform .5s ease}
.product-card:hover .main-product-img{transform:scale(1.03)}
.img-count{position:absolute;bottom:10px;right:12px;background:rgba(0,0,0,0.5);color:#fff;font-size:11px;padding:3px 10px;border-radius:20px;letter-spacing:0.04em}
.product-info{padding:18px 20px 22px}
.product-name{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:500;margin-bottom:6px;color:#1a1a18}
.product-price{color:#C9A84C;font-size:15px;font-weight:500;letter-spacing:0.04em;margin-bottom:4px}
.product-size{font-size:12px;color:#9a9590;letter-spacing:0.06em;text-transform:uppercase;margin-bottom:8px}
.product-description{font-size:13px;color:#6a6560;line-height:1.6;margin-bottom:14px}
.add-to-cart-btn{display:block;text-align:center;background:#1a1a18;color:#fff;padding:11px 20px;font-size:11.5px;letter-spacing:0.1em;text-transform:uppercase;text-decoration:none;transition:.25s;font-family:'Jost',sans-serif}
.add-to-cart-btn:hover{background:#C9A84C}

/* CART */
.cart-container{max-width:760px;margin:0 auto;padding:3.5rem 2rem 5rem}
.cart-title{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:300;margin-bottom:2rem;letter-spacing:0.05em}
.cart-item{display:flex;align-items:center;gap:16px;padding:16px 0;border-bottom:0.5px solid rgba(0,0,0,0.08)}
.cart-item-img{width:72px;height:72px;object-fit:cover;border-radius:4px;background:#f5f0e8;flex-shrink:0}
.cart-item-info{flex:1}
.cart-item-name{font-weight:500;font-size:15px;margin-bottom:3px}
.cart-item-price{color:#C9A84C;font-size:14px}
.cart-remove{font-size:12px;color:#b53030;text-decoration:none;border:0.5px solid rgba(200,40,40,0.3);padding:5px 12px;border-radius:4px;transition:.2s;white-space:nowrap}
.cart-remove:hover{background:#fdf0f0}
.cart-total{display:flex;justify-content:space-between;align-items:center;padding:20px 0;font-size:16px;font-weight:500;border-top:1px solid rgba(0,0,0,0.1);margin-top:8px}
.cart-total-price{font-family:'Cormorant Garamond',serif;font-size:24px;color:#C9A84C}

/* ORDER FORM */
.order-container{max-width:600px;margin:0 auto;padding:3.5rem 2rem 5rem}
.order-title{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:300;margin-bottom:0.5rem}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:#7a7570;margin-bottom:6px}
.form-group input,.form-group select,.form-group textarea{width:100%;background:#fff;border:0.5px solid rgba(0,0,0,0.15);border-radius:6px;font-family:'Jost',sans-serif;font-size:14px;padding:11px 14px;color:#1a1a18;outline:none;transition:.2s}
.form-group input:focus,.form-group select:focus{border-color:#C9A84C;box-shadow:0 0 0 2px rgba(201,168,76,0.1)}

/* SUCCESS */
.success-container{max-width:500px;margin:5rem auto;text-align:center;padding:2rem}
.success-icon{width:72px;height:72px;background:#f0f8f0;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem;font-size:32px}
.success-title{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;margin-bottom:0.8rem}
.success-msg{color:#6a6560;font-size:14px;line-height:1.7;margin-bottom:2rem}

/* FOOTER */
footer{background:#1a1a18;color:rgba(255,255,255,0.5);text-align:center;padding:2rem;font-size:12px;letter-spacing:0.06em}
footer a{color:#C9A84C;text-decoration:none}

/* EMPTY STATE */
.empty-state{text-align:center;padding:4rem 2rem;color:#9a9590}
.empty-state p{font-size:14px;font-style:italic}

@media(max-width:768px){
  nav{padding:0 20px;flex-wrap:wrap;height:auto;padding:14px 20px;gap:12px}
  .nav-links{gap:16px}
  .features{grid-template-columns:1fr}
  .feature-item{border-right:none;border-bottom:0.5px solid rgba(0,0,0,0.06)}
  .products-grid{grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px}
  .collection-container{padding:2.5rem 1rem 4rem}
  .hero-actions{flex-direction:column;align-items:center}
}
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">Elegancia</a>
  <div class="nav-links">
    <a href="/" class="{% block nav_home %}{% endblock %}">Accueil</a>
    <a href="/women" class="{% block nav_women %}{% endblock %}">Femmes</a>
    <a href="/men" class="{% block nav_men %}{% endblock %}">Hommes</a>
  </div>
  <a href="/cart" class="nav-cart">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
    Panier
  </a>
</nav>

{% block content %}{% endblock %}

<footer>
  <p>© 2024 Elegancia · <a href="/admin">Admin</a></p>
</footer>

</body>
</html>
