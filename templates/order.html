{% extends "base.html" %}

{% block content %}

<div style="max-width: 560px; margin: 0 auto; padding: 2rem;">

    <h1 class="page-title">Informations de livraison</h1>

    <!-- RÉSUMÉ PANIER -->
    {% if items %}
    <div class="order-summary">
        <div class="sum-title">Résumé de votre commande</div>
        {% for item in items %}
        <div class="sum-item">
            <span>{{ item.name }}</span>
            <span>{{ item.price }} DH</span>
        </div>
        {% endfor %}
        <div class="sum-total">
            <span>Total</span>
            <span>{{ total }} DH</span>
        </div>
    </div>
    {% endif %}

    <!-- FORMULAIRE -->
    <form method="POST" action="/order" class="order-form">

        <div class="form-row">
            <div class="form-group">
                <label>Nom</label>
                <input type="text" name="name" placeholder="Alami" required>
            </div>
            <div class="form-group">
                <label>Prénom</label>
                <input type="text" name="prenom" placeholder="Yasmine" required>
            </div>
        </div>

        <div class="form-group">
            <label>Adresse</label>
            <input type="text" name="adresse" placeholder="12 Rue Mohammed V, Casablanca" required>
        </div>

        <div class="form-group">
            <label>Téléphone</label>
            <input type="tel" name="phone" placeholder="06 12 34 56 78"
                   pattern="[0-9]{10}" maxlength="10" required>
        </div>

        <button type="submit" class="btn-primary" style="margin-top: 0.5rem;">
            Valider la commande
        </button>

    </form>

</div>

{% endblock %}
